<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Pro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF3B30">
    <link rel="apple-touch-icon" href="icons/icon.png">
    <style>
        :root {
            --primary: #809BCE;
            --primary-glow: rgba(128, 155, 206, 0.4);
            --bg: #F0F4F8; 
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #2D3436;
            --text-dim: #636E72;
            --break-color: #95B8D1;
            --accent: #EAC4D5;
            --btn-bg: #D6EADF;
            --mint: #B8E0D2;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg: #050505;
            --card-bg: rgba(12, 12, 12, 0.85);
            --text: #FFFFFF;
            --text-dim: #888888;
            --primary: #FF3B30;
            --primary-glow: rgba(255, 59, 48, 0.4);
            --btn-bg: #1C1C1E;
            --mint: #00D1FF;
            --accent: #0A0A0B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, backdrop-filter 0.4s ease, transform 0.1s ease;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 10% 10%, var(--accent) 0vw, transparent 40vw),
                radial-gradient(at 90% 90%, var(--btn-bg) 0vw, transparent 40vw),
                radial-gradient(at 50% 50%, #FFFFFF 0vw, transparent 70vw);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: auto;
        }
        
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 0.5vmin solid white;
            border-radius: 8vmin;
            box-shadow: 0 5vmin 12vmin -3vmin rgba(128, 155, 206, 0.25);
            padding: 7vmin 6vmin;
            width: 85vmin;
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        body.dark-mode .container {
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8vmin 15vmin -5vmin rgba(0, 0, 0, 0.8), 
                        0 0 10vmin -2vmin var(--primary-glow);
        }
        
        h1 {
            font-size: clamp(0.8rem, 2.8vmin, 1.4rem);
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--primary);
            margin-bottom: 4vmin;
            font-weight: 700;
            opacity: 0.8;
            width: 100%;
            text-align: center;
        }
        
        .timer-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(4rem, 20vmin, 15rem);
            font-weight: 500;
            margin: 1vmin 0 3vmin;
            color: var(--primary);
            width: 100%;
        }

        .timer-display.break { color: var(--text-dim); }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 1.5vmin 4vmin;
            border-radius: 100vmin;
            font-weight: 800;
            font-size: clamp(0.7rem, 2.2vmin, 1rem);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 3vmin;
            background: white;
            box-shadow: 0 1.5vmin 3vmin -1vmin rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .status-badge.work { color: white; background: var(--primary); box-shadow: 0 2vmin 4vmin var(--primary-glow); }
        .status-badge.break { color: var(--text); background: var(--mint); }

        .cycle-dot-container {
            display: flex;
            justify-content: center;
            gap: 2.5vmin;
            margin-bottom: 5vmin;
            width: 100%;
        }

        .cycle-dot {
            width: 2.2vmin;
            height: 2.2vmin;
            min-width: 10px;
            min-height: 10px;
            border-radius: 1.5vmin;
            background: white;
            border: 0.4vmin solid var(--bg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cycle-dot.filled {
            background: var(--primary);
            border-color: var(--primary);
            width: 7.5vmin;
        }
        
        .controls {
            display: flex;
            gap: 4vmin;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        
        .btn {
            background: white;
            color: var(--primary);
            border: none;
            width: clamp(75px, 18vmin, 130px);
            height: clamp(75px, 18vmin, 130px);
            border-radius: clamp(24px, 5vmin, 40px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 1.5vmin 3vmin -1vmin rgba(0,0,0,0.1);
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-1vmin) scale(1.03);
            box-shadow: 0 3vmin 6vmin -2vmin rgba(128, 155, 206, 0.25);
            background: white;
            color: #5a7bb5;
        }

        .btn:active:not(:disabled) {
            transform: scale(0.92);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 3vmin 6vmin -2vmin var(--primary-glow);
        }

        .btn-primary:hover:not(:disabled) {
            background: #6D8AC3;
            color: white;
            transform: translateY(-1vmin) scale(1.05);
        }
        
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        svg {
            width: 45%;
            height: 45%;
            display: block;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .footer {
            position: absolute;
            bottom: 2.2vmin;
            font-size: clamp(0.6rem, 1.6vmin, 0.8rem);
            letter-spacing: 0.15em;
            color: var(--text-dim);
            opacity: 0.6;
            font-weight: 600;
            text-transform: uppercase;
        }

        .theme-toggle {
            position: absolute;
            top: 4vmin;
            right: 5vmin;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 8vmin;
            height: 8vmin;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            transition: var(--transition);
            box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.05);
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: white;
            box-shadow: 0 2vmin 4vmin rgba(0,0,0,0.1);
        }

        body.dark-mode .theme-toggle {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--primary);
        }

        .theme-toggle svg {
            width: 50%;
            height: 50%;
        }
        /* Mobile Portrait Optimization */
        @media (max-width: 500px), (max-aspect-ratio: 7/10) {
            .container {
                width: 92vmin;
                padding: 10vmin 5vmin;
                border-radius: 10vmin;
            }
            h1 { font-size: 8vmin; margin-bottom: 5vmin; }
            .timer-display { font-size: 20vmin; margin: 4vmin 0; }
            .status-badge { font-size: 3.5vmin; padding: 1.5vmin 4vmin; }
            .controls { gap: 6vmin; margin-top: 6vmin; }
            .control-btn { width: 18vmin; height: 18vmin; }
            .dot-indicator { width: 2.5vmin; height: 2.5vmin; }
        }

        .install-btn {
            position: fixed;
            top: 2.5vmin;
            left: 4vmin;
            background: linear-gradient(135deg, #FFB703 0%, #FB8500 100%);
            color: #000;
            border: none;
            padding: 1.5vmin 4vmin;
            border-radius: 5vmin;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 2.8vmin;
            cursor: pointer;
            display: none;
            box-shadow: 0 1vmin 3vmin rgba(251, 133, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            white-space: nowrap;
            letter-spacing: 0.1vmin;
        }

        .install-btn:hover {
            transform: scale(1.08);
            filter: brightness(1.1);
            box-shadow: 0 1.5vmin 4vmin rgba(251, 133, 0, 0.6);
        }

        /* iOS Message Badge */
        .ios-install-badge {
            position: fixed;
            top: 2.5vmin;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a1a;
            padding: 1.5vmin 4.5vmin;
            border-radius: 6vmin;
            font-family: 'Outfit', sans-serif;
            font-size: 3vmin;
            font-weight: 500;
            display: none;
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.2);
            z-index: 999;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        body.dark-mode .ios-install-badge {
            background: rgba(30, 30, 30, 0.9);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 500px) {
            .install-btn, .ios-install-badge {
                top: 5vmin;
                width: 80%;
                font-size: 3.8vmin;
            }
        }
    </style>
</head>
<body>
    <button class="install-btn" id="installBtn">✨ INSTALAR</button>
    <div id="iosInstallBadge" class="ios-install-badge">
        📱 Toca <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> y luego "Añadir a pantalla de inicio"
    </div>
    <div class="container">
        <button class="theme-toggle" id="themeToggle" title="Cambiar Tema">
            <svg id="moonIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="sunIcon" style="display:none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <h1>Pomodoro Pro</h1>
        
        <div class="status-badge work" id="statusBadge">TIEMPO DE ENFOQUE</div>

        <div class="timer-display working" id="timer">25:00</div>

        <div class="cycle-dot-container" id="cycleDots">
            <div class="cycle-dot"></div>
            <div class="cycle-dot"></div>
            <div class="cycle-dot"></div>
            <div class="cycle-dot"></div>
        </div>

        <div class="controls">
            <button id="reset" class="btn" title="Reiniciar">
                <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0-5v5h5"/></svg>
            </button>
            <button id="start" class="btn btn-primary" title="Iniciar">
                <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <svg id="pauseIcon" style="display:none" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button id="pause" class="btn" disabled title="Pausar" style="display:none">Pausa</button> <!-- Hidden but kept for logic for now -->
        </div>

        <div class="footer">© by WEB ARTISAN SPA</div>
    </div>

    <script>
        // Configuracion
        const TIMES = {
            WORK: 25 * 60 * 1000,
            SHORT_BREAK: 5 * 60 * 1000,
            LONG_BREAK: 15 * 60 * 1000
        };

        // Estado
        let timerId = null;
        let remainingTime = TIMES.WORK;
        let targetTime = null;
        let isRunning = false;
        let isWorkSession = true;
        let cyclesCompleted = 0;

        const timerElement = document.getElementById('timer');
        const startBtn = document.getElementById('start');
        const resetBtn = document.getElementById('reset');
        const statusBadge = document.getElementById('statusBadge');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const cycleDots = document.querySelectorAll('.cycle-dot');
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        // Theme Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons(isDark);
            
            // Reset background style when switching back to light mode
            if (!isDark) {
                document.body.style.backgroundImage = '';
            }
            updateDisplay();
        }

        function updateThemeIcons(isDark) {
            sunIcon.style.display = isDark ? 'block' : 'none';
            moonIcon.style.display = isDark ? 'none' : 'block';
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            updateThemeIcons(true);
        }

        themeToggle.addEventListener('click', toggleTheme);

        function updateDisplay() {
            const totalSeconds = Math.ceil(remainingTime / 1000);
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            timerElement.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            // UI Updates
            if (isWorkSession) {
                statusBadge.textContent = "TIEMPO DE ENFOQUE";
                statusBadge.className = "status-badge work";
                timerElement.className = "timer-display working";
                if (document.body.classList.contains('dark-mode')) {
                    document.body.style.backgroundImage = `radial-gradient(at 0% 0%, #FF3B30 0vmin, transparent 50vmin), radial-gradient(at 100% 100%, #141E30 0vmin, transparent 60vmin), radial-gradient(at 50% 50%, #050505 0vmin, transparent 100vmin)`;
                }
            } else {
                statusBadge.textContent = (cyclesCompleted === 0) ? "DESCANSO (LARGO)" : "DESCANSO (CORTO)";
                statusBadge.className = "status-badge break";
                timerElement.className = "timer-display break";
                if (document.body.classList.contains('dark-mode')) {
                    document.body.style.backgroundImage = `radial-gradient(at 0% 0%, #00D1FF 0vmin, transparent 50vmin), radial-gradient(at 100% 100%, #0A192F 0vmin, transparent 60vmin), radial-gradient(at 50% 50%, #050505 0vmin, transparent 100vmin)`;
                }
            }

            // Sync dots
            cycleDots.forEach((dot, index) => {
                dot.classList.toggle('filled', index < cyclesCompleted);
            });
        }

        // Audio Alarma
        function playAlarm() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const playBeep = (freq, time, duration) => {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(freq, time);
                    gainNode.gain.setValueAtTime(0.5, time);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, time + duration);
                    oscillator.start(time);
                    oscillator.stop(time + duration);
                };
                // Doble beep elegante
                playBeep(880, audioCtx.currentTime, 0.4);
                playBeep(1100, audioCtx.currentTime + 0.5, 0.6);
            } catch (e) {
                console.error("Error al reproducir audio:", e);
            }
        }

        function notify(title, message) {
            playAlarm(); // Alarma sonora
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body: message, icon: 'icon-192.png' });
            }
        }

        function switchSession() {
            if (isWorkSession) {
                cyclesCompleted++;
                if (cyclesCompleted >= 4) {
                    cyclesCompleted = 0;
                    remainingTime = TIMES.LONG_BREAK;
                    notify('¡Buen trabajo!', 'Es hora de un gran descanso de 15 minutos.');
                } else {
                    remainingTime = TIMES.SHORT_BREAK;
                    notify('¡Sesión finalizada!', 'Tómate un breve descanso de 5 minutos.');
                }
            } else {
                remainingTime = TIMES.WORK;
                notify('¡De vuelta!', 'Es hora de concentrarse de nuevo.');
            }
            isWorkSession = !isWorkSession;
            isRunning = false;
            clearInterval(timerId);
            timerId = null;
            togglePlayUI(false);
            updateDisplay();
        }

        function tick() {
            if (!isRunning) return;
            
            const now = Date.now();
            remainingTime = Math.max(0, targetTime - now);
            
            if (remainingTime <= 0) {
                switchSession();
            } else {
                updateDisplay();
            }
        }

        function togglePlayUI(playing) {
            playIcon.style.display = playing ? 'none' : 'block';
            pauseIcon.style.display = playing ? 'block' : 'none';
        }

        startBtn.addEventListener('click', () => {
            if (isRunning) {
                // Peusar
                isRunning = false;
                clearInterval(timerId);
                timerId = null;
                togglePlayUI(false);
            } else {
                // Iniciar
                isRunning = true;
                targetTime = Date.now() + remainingTime;
                timerId = setInterval(tick, 100); // 10 ticks/seg para más fluidez
                togglePlayUI(true);
            }
        });

        resetBtn.addEventListener('click', () => {
            isRunning = false;
            clearInterval(timerId);
            timerId = null;
            isWorkSession = true;
            cyclesCompleted = 0; // Reset cycles on hard reset? Let's say yes for simplicity.
            remainingTime = TIMES.WORK;
            togglePlayUI(false);
            updateDisplay();
        });

        // Initialize display
        updateDisplay();
        console.log('Pomodoro Pro listo con precisión de tiempo absoluta.');

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado.', reg.scope))
                    .catch(err => console.log('Error al registrar Service Worker.', err));
            });
        }

        // PWA Install Prompt Logic
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Update UI to notify the user they can add to home screen
            installBtn.style.display = 'block';

            installBtn.addEventListener('click', () => {
                // hide our install button
                installBtn.style.display = 'none';
                // Show the prompt
                deferredPrompt.prompt();
                // Wait for the user to respond to the prompt
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    } else {
                        console.log('User dismissed the install prompt');
                    }
                    deferredPrompt = null;
                });
            });
        });

        window.addEventListener('appinstalled', (evt) => {
            console.log('La aplicación se instaló correctamente.');
            installBtn.style.display = 'none';
        });

        // Detection for iOS/Safari (which doesn't support beforeinstallprompt)
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        const iosBadge = document.getElementById('iosInstallBadge');
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

        if (isIOS && isSafari && !isStandalone) {
            iosBadge.style.display = 'block';
            // Hide after 8 seconds
            setTimeout(() => {
                iosBadge.style.opacity = '0';
                setTimeout(() => iosBadge.style.display = 'none', 500);
            }, 8000);
        }
    </script>
</body>
</html>
